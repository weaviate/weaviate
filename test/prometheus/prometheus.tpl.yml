# Prometheus config template for acceptance-test performance metrics.
#
# Rendered by test/prometheus/start.sh, which substitutes the env vars below.
# A single host-networked Prometheus discovers every ephemeral Weaviate the test
# harness publishes into ${METRICS_SD_DIR} (one file_sd JSON file per node) and
# scrapes its mapped host metrics port for the lifetime of the test.
global:
  scrape_interval: 2s
  scrape_timeout: 2s
  external_labels:
    git_sha: "${GIT_SHA}"
    git_branch: "${GIT_BRANCH}"

scrape_configs:
  - job_name: weaviate-acceptance
    metrics_path: /metrics
    file_sd_configs:
      - files:
          - "${METRICS_SD_DIR}/*.json"
        refresh_interval: 2s
