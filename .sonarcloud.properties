# SonarCloud configuration for weaviate/weaviate.
#
# SonarCloud Automatic Analysis reads THIS file, not sonar-project.properties
# (only the CI-based scanner honors that, and this repo doesn't run it).
#
# Excludes generated go-swagger boilerplate (tools/gen-code-from-swagger.sh)
# from duplication detection — the generator's repetition isn't hand-written
# copy-paste. Patterns end in /**/* (not /**) so they match files, not just
# directories.
sonar.cpd.exclusions=adapters/handlers/rest/operations/**/*,adapters/handlers/rest/embedded_spec.go,client/**/*,entities/models/**/*
