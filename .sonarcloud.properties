# SonarCloud configuration for weaviate/weaviate.
#
# This project is analyzed via SonarCloud Automatic Analysis (no scanner runs in
# CI). Automatic Analysis reads its configuration from THIS file,
# `.sonarcloud.properties`. It deliberately ignores `sonar-project.properties`
# (that filename is only honored by the CI-based sonar-scanner, which this repo
# does not run), so exclusions must live here to take effect.
#
# The go-swagger code generator (tools/gen-code-from-swagger.sh) emits large
# amounts of near-identical boilerplate — per-operation URL builders, request
# parameter binders, and response types — into the directories below. Their
# duplication is an artifact of code generation, not hand-written copy-paste,
# and was tripping the "duplication on new code" quality gate (388 of 435
# flagged duplicate lines were generated swagger output). Exclude the generated
# trees from copy-paste detection so the gate measures only hand-written code.
# These trees are wholesale removed and regenerated by
# tools/gen-code-from-swagger.sh, so nothing hand-written lives under them.
#
# Patterns end in `/**/*` so they match the files under each tree, not just the
# directories (a bare trailing `/**` matches directories only and leaves the
# files in copy-paste detection).
sonar.cpd.exclusions=adapters/handlers/rest/operations/**/*,adapters/handlers/rest/embedded_spec.go,client/**/*,entities/models/**/*
