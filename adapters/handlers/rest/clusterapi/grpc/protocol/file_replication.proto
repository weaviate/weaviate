syntax = "proto3";

package clusterapi;

enum CompressionType {
  COMPRESSION_TYPE_UNSPECIFIED = 0;     // No compression
  COMPRESSION_TYPE_GZIP = 1;     // gzip (compress/gzip)
  COMPRESSION_TYPE_ZLIB = 2;     // zlib (compress/zlib)
  COMPRESSION_TYPE_DEFLATE = 3;  // raw DEFLATE (compress/flate)
}

service FileReplicationService {
  rpc PauseFileActivity (PauseFileActivityRequest) returns (PauseFileActivityResponse);

  rpc ResumeFileActivity (ResumeFileActivityRequest) returns (ResumeFileActivityResponse);

  rpc ListFiles (ListFilesRequest) returns (ListFilesResponse);

  rpc GetFileMetadata (GetFileMetadataRequest) returns (FileMetadata);

  rpc GetFile (GetFileRequest) returns (stream FileChunk);

  rpc StartChangeCapture (StartChangeCaptureRequest) returns (StartChangeCaptureResponse);

  rpc GetChangeLog (GetChangeLogRequest) returns (stream ChangeLogStreamEntry);

  rpc SnapshotChangeLogLSN (SnapshotChangeLogLSNRequest) returns (SnapshotChangeLogLSNResponse);

  rpc FinalizeChangeLog (FinalizeChangeLogRequest) returns (FinalizeChangeLogResponse);

  rpc StopChangeCapture (StopChangeCaptureRequest) returns (StopChangeCaptureResponse);
}

message PauseFileActivityRequest {
  string index_name = 1;
  string shard_name = 2;
  uint64 schema_version = 3;
}

message PauseFileActivityResponse {
  string index_name = 1;
  string shard_name = 2;
}

message ResumeFileActivityRequest {
  string index_name = 1;
  string shard_name = 2;
}

message ResumeFileActivityResponse {
  string index_name = 1;
  string shard_name = 2;
}

message ListFilesRequest {
  string index_name = 1;
  string shard_name = 2;
}

message ListFilesResponse {
  string index_name = 1;
  string shard_name = 2;
  repeated string file_names = 3;
}

message GetFileMetadataRequest {
  string index_name = 1;
  string shard_name = 2;
  string file_name = 3;
}

message FileMetadata {
  string index_name = 1;
  string shard_name = 2;
  string file_name = 3;
  int64 size = 4;
  uint32 crc32 = 5;
}

message GetFileRequest {
  string index_name = 1;
  string shard_name = 2;
  string file_name = 3;
  CompressionType compression = 4; // Requested compression algorithm for streamed chunks
}

message FileChunk {
  int64 offset = 1; // Byte offset in the uncompressed file
  bytes data = 2; // Compressed or raw chunk data
  bool eof = 3; // Indicates final chunk
}

message StartChangeCaptureRequest {
  string index_name = 1;
  string shard_name = 2;
  string op_id = 3;
}

message StartChangeCaptureResponse {
  string index_name = 1;
  string shard_name = 2;
  string op_id = 3;
}

message GetChangeLogRequest {
  string index_name = 1;
  string shard_name = 2;
  string op_id = 3;
  // Inclusive upper bound on emitted LSNs. The stream closes cleanly with
  // io.EOF after lsn >= until_lsn (or when the log is finalized, whichever
  // fires first), without sealing the log. until_lsn=0 emits no entries —
  // a quiet shard's Snapshot returns 0 and the cap'd drain must not hang.
  uint64 until_lsn = 4;
}

message SnapshotChangeLogLSNRequest {
  string index_name = 1;
  string shard_name = 2;
  string op_id = 3;
}

message SnapshotChangeLogLSNResponse {
  string index_name = 1;
  string shard_name = 2;
  string op_id = 3;
  // The highest LSN in the change log at snapshot time. The log remains
  // writable.
  uint64 lsn = 4;
}

message ChangeLogStreamEntry {
  uint64 lsn = 1;
  bool is_delete = 2;
  int64 update_time_millis = 3;
  bytes uuid = 4;
  bytes payload = 5;
}

message FinalizeChangeLogRequest {
  string index_name = 1;
  string shard_name = 2;
  string op_id = 3;
}

message FinalizeChangeLogResponse {
  string index_name = 1;
  string shard_name = 2;
  string op_id = 3;
  uint64 final_lsn = 4;
}

message StopChangeCaptureRequest {
  string index_name = 1;
  string shard_name = 2;
  string op_id = 3;
}

message StopChangeCaptureResponse {
  string index_name = 1;
  string shard_name = 2;
  string op_id = 3;
}

