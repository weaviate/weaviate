# Exclude auto-generated code from Copy/Paste Detection (CPD).
# go-swagger regenerates entities/models/, client/, and adapters/handlers/rest/operations/
# from openapi-specs/schema.json; mockery regenerates mock_*.go files.
# Duplicated patterns in these files are inherent to code generation and are not
# actionable by developers.
sonar.cpd.exclusions=entities/models/**,adapters/handlers/rest/operations/**,client/**,**/mock_*.go
