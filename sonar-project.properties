# SonarCloud configuration for weaviate/weaviate.
#
# This project is analyzed via SonarCloud Automatic Analysis. Only a small set
# of analysis parameters are read from this file; duplication exclusions
# (sonar.cpd.exclusions) are among them.
#
# The go-swagger code generator (tools/gen-code-from-swagger.sh) emits large
# amounts of near-identical boilerplate — per-operation URL builders, request
# parameter binders, and response types — into the directories below. Their
# duplication is an artifact of code generation, not hand-written copy-paste,
# and was tripping the "duplication on new code" quality gate (388 of 432
# flagged duplicate lines were generated swagger output). Exclude the
# generated trees from copy-paste detection so the gate measures only
# hand-written code. These trees are wholesale removed and regenerated by
# tools/gen-code-from-swagger.sh, so nothing hand-written lives under them.
sonar.cpd.exclusions=adapters/handlers/rest/operations/**,adapters/handlers/rest/embedded_spec.go,client/**,entities/models/**
