syntax = "proto3";

package weaviate.v1;

import "google/protobuf/struct.proto";
import "v1/base.proto";

option go_package = "github.com/weaviate/weaviate/grpc/generated;protocol";
option java_package = "io.weaviate.client.grpc.protocol.v1";
option java_outer_classname = "WeaviateProtoBatch";

message BatchObjectsRequest {
  repeated BatchObject objects = 1;
  optional ConsistencyLevel consistency_level = 2;
}

message BatchReferencesRequest {
  repeated BatchReference references = 1;
  optional ConsistencyLevel consistency_level = 2;
}

message BatchStreamRequest {
  message Start {
    optional ConsistencyLevel consistency_level = 1;
  }
  message Stop{
  }
  message Data {
    message Objects {
      repeated BatchObject values = 1;
    }
    message References {
      repeated BatchReference values = 1;
    }
    Objects objects = 1;
    References references = 2;
  }
  oneof message {
    Start start = 1;
    Data data = 2;
    Stop stop = 3;
  }
}

message BatchStreamReply {
  message Started {
  }
  message ShuttingDown {
  }
  message OutOfMemory{
    repeated string uuids = 1;
    repeated string beacons = 2;
    // How long to wait until ShuttingDown is sent, in seconds
    // If ShuttingDown is not set by this time, the client should exit the stream
    int32 wait_time = 3;
  }
  message Backoff {
    int32 batch_size = 1;
  }
  message Acks {
    repeated string uuids = 1;
    repeated string beacons = 2;
  }
  message Results {
    message Error {
      string error = 1;
      oneof detail {
        string uuid = 2;
        string beacon = 3;
      }
    }
    message Success {
      oneof detail {
        string uuid = 2;
        string beacon = 3;
      }
    }
    repeated Error errors = 1;
    repeated Success successes = 2;
  }
  oneof message {
    Results results = 1;
    ShuttingDown shutting_down = 2;
    Started started = 4;
    Backoff backoff = 5;
    Acks acks = 6;
    OutOfMemory out_of_memory = 7;
  }
  reserved 3; // was shutdown
  reserved "shutdown";
}

// ConditionalWriteRequest carries the precondition for a conditional write.
// Exactly one of the oneof condition_type fields must be set per write.
// Phase 1 (insert_if_not_exists) is implemented; Phase 2 (version_match) and
// Phase 3 (field_predicate) are forward-declared so the wire contract is stable
// and old clients remain compatible (unknown fields are silently ignored).
message ConditionalWriteRequest {
  oneof condition_type {
    InsertIfNotExists insert_if_not_exists = 1;
    VersionMatch version_match = 2;
    FieldPredicate field_predicate = 3;
  }
  // return_current, when true, requests that the server populate
  // ConditionalWriteReply.current_object_blob on condition failure. Omit or
  // set false when bandwidth is a concern.
  bool return_current = 8;
}

// InsertIfNotExists is the Phase-1 condition: the write succeeds only if no
// object with the given UUID currently exists.
message InsertIfNotExists {}

// VersionMatch is the Phase-2 condition: the write succeeds only if the stored
// object's server-managed version equals expected_version.
message VersionMatch {
  int64 expected_version = 1;
}

// FieldPredicate is the Phase-3 condition: the write succeeds only if the
// stored object's field at `field` satisfies the predicate.
message FieldPredicate {
  string field = 1;
  FieldOperator operator = 2;
  oneof value {
    string string_value = 3;
    int64 int_value = 4;
    double double_value = 5;
    bool bool_value = 6;
  }
}

// FieldOperator enumerates the comparison operators supported by FieldPredicate.
enum FieldOperator {
  FIELD_OPERATOR_UNSPECIFIED = 0;
  FIELD_OPERATOR_EQ = 1;
  FIELD_OPERATOR_NE = 2;
  FIELD_OPERATOR_LT = 3;
  FIELD_OPERATOR_LTE = 4;
  FIELD_OPERATOR_GT = 5;
  FIELD_OPERATOR_GTE = 6;
  FIELD_OPERATOR_EXISTS = 7;
  FIELD_OPERATOR_NOT_EXISTS = 8;
}

// ConditionalWriteOutcome is the per-object result of a conditional write.
enum ConditionalWriteOutcome {
  CONDITIONAL_WRITE_OUTCOME_UNSPECIFIED = 0;
  // Object was newly created.
  CONDITIONAL_WRITE_OUTCOME_INSERTED = 1;
  // Object was skipped because it already exists (insert_if_not_exists).
  CONDITIONAL_WRITE_OUTCOME_SKIPPED = 2;
  // Object was updated successfully.
  CONDITIONAL_WRITE_OUTCOME_UPDATED = 3;
  // Condition failed (field predicate not satisfied).
  CONDITIONAL_WRITE_OUTCOME_CONDITION_FAILED = 4;
  // Version mismatch (stored version != expected_version).
  CONDITIONAL_WRITE_OUTCOME_VERSION_MISMATCH = 5;
  // Object not found when a version-CAS or field-predicate update was attempted.
  CONDITIONAL_WRITE_OUTCOME_NOT_FOUND = 6;
}

// ConditionalWriteReply carries the per-object outcome of a conditional write.
// It is embedded in BatchObjectsReply.ObjectResult alongside the object UUID.
message ConditionalWriteReply {
  // outcome is the canonical "what happened" field.
  ConditionalWriteOutcome outcome = 1;
  // new_version is the server-assigned version after a successful write.
  // Populated when outcome is INSERTED or UPDATED.
  optional int64 new_version = 2;
  // current_version is the version observed on the server when the condition
  // failed. Populated when outcome is VERSION_MISMATCH.
  optional int64 current_version = 3;
  // field_value is the actual field value observed when a FieldPredicate
  // condition failed.
  optional string field_value = 4;
  // predicate_path echoes the field path from the FieldPredicate that failed.
  optional string predicate_path = 5;
  // current_object_blob is the existing object serialized in
  // weaviate.proto.v1.Object format. Populated only when
  // ConditionalWriteRequest.return_current was true and outcome is SKIPPED
  // (existence-check failure) or VERSION_MISMATCH / CONDITION_FAILED.
  optional bytes current_object_blob = 6;
  // error_message carries a human-readable diagnostic for the condition failure.
  optional string error_message = 7;
}

message BatchObject {
  message Properties {
    google.protobuf.Struct non_ref_properties = 1;
    repeated SingleTargetRefProps single_target_ref_props = 2;
    repeated MultiTargetRefProps multi_target_ref_props = 3;
    repeated NumberArrayProperties number_array_properties = 4;
    repeated IntArrayProperties int_array_properties = 5;
    repeated TextArrayProperties text_array_properties = 6;
    repeated BooleanArrayProperties boolean_array_properties = 7;
    repeated ObjectProperties object_properties = 8;
    repeated ObjectArrayProperties object_array_properties = 9;
    // empty lists do not have a type in many languages and clients do not know which datatype the property has.
    // Weaviate can get the datatype from its schema
    repeated string empty_list_props = 10;
  }

  message SingleTargetRefProps {
    repeated string uuids = 1;
    string prop_name = 2;
  }

  message MultiTargetRefProps {
    repeated string uuids = 1;
    string prop_name = 2;
    string target_collection = 3;
  }

  string uuid = 1;
  // protolint:disable:next REPEATED_FIELD_NAMES_PLURALIZED
  repeated float vector = 2 [deprecated = true]; // deprecated, will be removed
  Properties properties = 3;
  string collection = 4;
  string tenant = 5;
  bytes vector_bytes = 6;
  // protolint:disable:next REPEATED_FIELD_NAMES_PLURALIZED
  repeated Vectors vectors = 23;
  // conditional carries the optional precondition for this object's write.
  // Absent (nil) means unconditional write (existing behavior).
  optional ConditionalWriteRequest conditional = 24;
}

message BatchReference {
  string name = 1;
  string from_collection = 2;
  string from_uuid = 3;
  optional string to_collection = 4;
  string to_uuid = 5;
  string tenant = 6;
}

message BatchObjectsReply {
  message BatchError {
    int32 index = 1;
    string error = 2;
  }

  // ObjectResult carries the per-object outcome for conditional writes.
  // Non-conditional objects do not produce an ObjectResult entry.
  message ObjectResult {
    string uuid = 1;
    ConditionalWriteReply conditional_result = 2;
  }

  float took = 1;
  repeated BatchError errors = 2;
  // object_results holds per-object conditional write outcomes. Absent when
  // the batch contained no conditional writes.
  repeated ObjectResult object_results = 3;
}

message BatchReferencesReply {
  message BatchError {
    int32 index = 1;
    string error = 2;
  }

  float took = 1;
  repeated BatchError errors = 2;
}
