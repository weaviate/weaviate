name: Generate release assets

on:
  release:
    types: [published]

env:
  CGO_ENABLED: 0

permissions:
  contents: write

jobs:
  releases-matrix:
    name: Release precompiled binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: wangyoucao577/go-release-action@279495102627de7960cbc33434ab01a12bae144b # v1.55
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          goos: ${{ matrix.goos }}
          goarch: ${{ matrix.goarch }}
          goversion: "1.26"
          project_path: "./cmd/weaviate-server"
          extra_files: LICENSE README.md
          ldflags: -w -extldflags "-static" -X github.com/weaviate/weaviate/usecases/config.GitHash='"$GITHASH"'
          sha256sum: true
